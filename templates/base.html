<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MORPH{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --bot: #bc8cff;
            --gap: 16px;
            --card-padding: 24px;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background: radial-gradient(circle at 10% -20%, #1d2838 0%, rgba(29, 40, 56, 0) 36%), var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 17, 23, 0.86);
            backdrop-filter: blur(8px);
        }

        .topbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            min-height: 52px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            color: var(--accent);
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.01em;
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }

        .nav-links {
            display: flex;
            align-items: stretch;
            gap: 6px;
            min-height: 52px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            border: 1px solid transparent;
            border-bottom: 2px solid transparent;
            border-radius: 8px 8px 0 0;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            transition: color 120ms ease, background-color 120ms ease, border-color 120ms ease, border-bottom-color 120ms ease;
        }

        .nav-link:hover {
            color: #d8e2ee;
            background: rgba(88, 166, 255, 0.14);
            border-color: rgba(88, 166, 255, 0.28);
        }

        .nav-link.active {
            color: #f6fbff;
            background: rgba(88, 166, 255, 0.18);
            border-color: rgba(88, 166, 255, 0.35);
            border-bottom-color: var(--accent);
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .section-stack {
            display: grid;
            gap: 16px;
        }

        h1,
        h2,
        h3 {
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
        }

        h1 {
            font-size: 1.55rem;
        }

        h2 {
            font-size: 1.15rem;
        }

        .subtle {
            color: var(--text-secondary);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--card-padding);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: var(--gap);
        }

        .metric-card {
            min-height: 136px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }

        .stat-card {
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 0 0 1px rgba(88, 166, 255, 0.22), 0 12px 24px rgba(88, 166, 255, 0.2);
        }

        .metric-label {
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            font-size: 0.85rem;
        }

        .metric-value {
            font-size: clamp(1.8rem, 3.5vw, 2.35rem);
            font-weight: 700;
            line-height: 1;
        }

        .value-accent {
            color: var(--accent);
        }

        .value-danger {
            color: var(--danger);
        }

        .value-success {
            color: var(--success);
        }

        .value-warning {
            color: var(--warning);
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid rgba(48, 54, 61, 0.9);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        thead th {
            text-align: left;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            font-weight: 600;
            background: #10161d;
            border-bottom: 1px solid var(--border);
            padding: 12px 14px;
            white-space: nowrap;
        }

        tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.6);
            vertical-align: middle;
        }

        tbody tr:nth-child(even) {
            background: rgba(11, 18, 25, 0.45);
        }

        tbody tr:hover {
            background: rgba(88, 166, 255, 0.09);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .link {
            color: var(--accent);
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .btn {
            border: 1px solid rgba(88, 166, 255, 0.45);
            color: var(--text);
            background: rgba(88, 166, 255, 0.12);
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background-color 120ms ease, border-color 120ms ease;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(88, 166, 255, 0.24);
            border-color: rgba(88, 166, 255, 0.65);
            text-decoration: none;
        }

        .btn.ghost {
            background: transparent;
            border-color: var(--border);
            color: var(--text-secondary);
        }

        .btn.ghost:hover {
            color: var(--text);
            background: rgba(139, 148, 158, 0.15);
            border-color: rgba(139, 148, 158, 0.35);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid transparent;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge-bot {
            color: var(--bot);
            background: rgba(188, 140, 255, 0.16);
            border-color: rgba(188, 140, 255, 0.35);
        }

        .badge-human {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.14);
            border-color: rgba(88, 166, 255, 0.35);
        }

        .badge-recon {
            color: var(--accent);
            background: rgba(88, 166, 255, 0.14);
            border-color: rgba(88, 166, 255, 0.35);
        }

        .badge-exploit {
            color: var(--danger);
            background: rgba(248, 81, 73, 0.14);
            border-color: rgba(248, 81, 73, 0.35);
        }

        .badge-persistence {
            color: var(--bot);
            background: rgba(188, 140, 255, 0.14);
            border-color: rgba(188, 140, 255, 0.35);
        }

        .badge-low {
            color: var(--success);
            background: rgba(63, 185, 80, 0.14);
            border-color: rgba(63, 185, 80, 0.35);
        }

        .badge-medium {
            color: var(--warning);
            background: rgba(210, 153, 34, 0.14);
            border-color: rgba(210, 153, 34, 0.35);
        }

        .badge-high {
            color: var(--danger);
            background: rgba(248, 81, 73, 0.18);
            border-color: rgba(248, 81, 73, 0.4);
        }

        .empty-state {
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 34px;
            text-align: center;
            color: var(--text-secondary);
        }

        .split-2 {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: var(--gap);
            align-items: start;
        }

        .kv-grid {
            display: grid;
            grid-template-columns: 150px minmax(0, 1fr);
            gap: 10px 14px;
        }

        .kv-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .code-tag {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.8rem;
            color: var(--warning);
            background: rgba(210, 153, 34, 0.11);
            border: 1px solid rgba(210, 153, 34, 0.28);
            border-radius: 8px;
            padding: 5px 9px;
        }

        .timeline {
            list-style: none;
            display: grid;
            gap: 10px;
        }

        .timeline li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 10px 12px;
            border: 1px solid rgba(48, 54, 61, 0.75);
            border-radius: 10px;
            background: rgba(13, 17, 23, 0.55);
        }

        .timeline-index {
            min-width: 26px;
            color: var(--text-secondary);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.82rem;
            margin-top: 2px;
        }

        .timeline-command {
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            word-break: break-word;
        }

        .input {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f141b;
            color: var(--text);
            padding: 10px 12px;
            outline: none;
        }

        .input:focus {
            border-color: rgba(88, 166, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .select {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0f141b;
            color: var(--text);
            padding: 10px 12px;
            outline: none;
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, var(--text-secondary) 50%), linear-gradient(135deg, var(--text-secondary) 50%, transparent 50%);
            background-position: calc(100% - 16px) calc(50% - 3px), calc(100% - 10px) calc(50% - 3px);
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }

        .select:focus {
            border-color: rgba(88, 166, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .terminal {
            background: #0a0f14;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            height: 560px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.86rem;
            line-height: 1.45;
        }

        .log-line {
            display: grid;
            grid-template-columns: 148px minmax(0, 1fr);
            gap: 12px;
            padding: 5px 8px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .log-text {
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-connect .log-text {
            color: var(--success);
        }

        .log-login .log-text {
            color: var(--warning);
        }

        .log-command .log-text {
            color: var(--danger);
        }

        .log-disconnect .log-text {
            color: var(--accent);
        }

        .row-clickable {
            cursor: pointer;
        }

        .muted {
            color: var(--text-secondary);
        }

        @media (max-width: 1080px) {
            .grid-4 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .split-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .topbar-inner,
            main {
                padding: 16px;
            }

            .logo {
                font-size: 16px;
            }

            .nav-links {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
                min-height: auto;
            }

            .nav-link {
                border-bottom-width: 1px;
                border-radius: 8px;
                padding: 8px 12px;
            }

            .topbar-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .grid-4 {
                grid-template-columns: 1fr;
            }

            .kv-grid {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .log-line {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .terminal {
                height: 460px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="logo">MORPH</a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
                <a href="/sessions" class="nav-link {% if request.endpoint in ['sessions', 'dossier_detail'] %}active{% endif %}">Sessions</a>
                <a href="/live-logs" class="nav-link {% if request.endpoint in ['live_logs', 'api_logs'] %}active{% endif %}">Live Logs</a>
                <a href="/about" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
