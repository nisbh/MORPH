<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MORPH{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        nav {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #58a6ff;
        }
        
        nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        nav a:hover, nav a.active {
            color: #c9d1d9;
            background: #21262d;
        }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            color: #c9d1d9;
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
        }
        
        h2 {
            color: #8b949e;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #58a6ff;
        }
        
        .stat-label {
            color: #8b949e;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #21262d;
        }
        
        th {
            color: #8b949e;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
        }
        
        tr:hover {
            background: #21262d;
        }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-low { background: #238636; color: #fff; }
        .badge-medium { background: #9e6a03; color: #fff; }
        .badge-high { background: #da3633; color: #fff; }
        .badge-bot { background: #8957e5; color: #fff; }
        .badge-human { background: #58a6ff; color: #fff; }
        .badge-recon { background: #388bfd; color: #fff; }
        .badge-exploit { background: #f85149; color: #fff; }
        .badge-persistence { background: #a371f7; color: #fff; }
        
        a.link {
            color: #58a6ff;
            text-decoration: none;
        }
        
        a.link:hover {
            text-decoration: underline;
        }
        
        .log-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .log-line {
            padding: 0.25rem 0;
            border-bottom: 1px solid #21262d;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .log-line:last-child {
            border-bottom: none;
        }
        
        .command-list {
            list-style: none;
        }
        
        .command-list li {
            padding: 0.5rem;
            background: #0d1117;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-family: monospace;
        }
        
        .command-list li::before {
            content: "$ ";
            color: #238636;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 0.5rem 1rem;
        }
        
        .detail-label {
            color: #8b949e;
            font-weight: 600;
        }
        
        .section {
            margin-bottom: 2rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #8b949e;
        }
        
        .refresh-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #238636;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">🦠 MORPH</span>
        <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
        <a href="/sessions" {% if request.endpoint == 'sessions' %}class="active"{% endif %}>Sessions</a>
        <a href="/live-logs" {% if request.endpoint == 'live_logs' %}class="active"{% endif %}>Live Logs</a>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
