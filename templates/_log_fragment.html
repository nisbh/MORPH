{% for entry in entries %}
<div class="log-line log-{{ entry.event_type }}">
	<span class="log-time">[{{ entry.timestamp }}]</span>
	<span class="log-text">[{{ entry.label }}] {{ entry.src_ip }} &rarr; {{ entry.details }}</span>
</div>
{% endfor %}
{% if not entries %}
<div class="log-line">
	<span class="log-time">--:--:--</span>
	<span class="log-text muted">No log entries yet.</span>
</div>
{% endif %}
